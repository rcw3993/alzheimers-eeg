# End-to-end experiment: bandpower extraction + RF training (threshold-optimized)
# Usage: python scripts/run_experiment.py configs/experiments/bandpower_rf_v1.yaml

name: bandpower_rf_v1
description: >
  Baseline experiment. Spectral bandpower (Welch) on 5 electrodes (T4, Pz, Cz, T6, C3)
  selected via electrode sweep. Random Forest with threshold tuned for sensitivity >= 0.85.

# Step 1: feature extraction
features_config: configs/features/bandpower.yaml

# Step 2: training + evaluation
training_config: configs/training/bandpower_rf_thresh.yaml

# Save a final model trained on all data after CV?
save_final_model: true